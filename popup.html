<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="extName">Bookmark Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="appTitle">📚 Bookmark Organizer</h1>
      <p class="subtitle" data-i18n="appSubtitle">Smart Categorize · Deduplicate · Backup</p>
      <div class="header-controls">
        <div class="lang-selector-container">
          <select id="langSelector" class="lang-selector" title="Select Language"></select>
        </div>
        <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
      </div>
    </header>

    <!-- 主控制面板 -->
    <section class="control-panel">
      <button id="scanBtn" class="btn btn-primary" data-i18n="btnScan">
        🔍 Start Scan
      </button>
      <button id="backupBtn" class="btn btn-secondary" data-i18n="btnBackup">
        💾 Backup Now
      </button>
    </section>

    <!-- 进度条 -->
    <div id="progressContainer" class="progress-container hidden">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText" class="progress-text" data-i18n="progressAnalyzing">Analyzing...</p>
    </div>

    <!-- 统计信息 -->
    <div id="statsPanel" class="stats-panel hidden">
      <div class="stat-item">
        <span class="stat-value" id="totalBookmarks">0</span>
        <span class="stat-label" data-i18n="labelTotalBookmarks">Total Bookmarks</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="uncategorizedCount">0</span>
        <span class="stat-label" data-i18n="labelUncategorized">Uncategorized</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="duplicatesCount">0</span>
        <span class="stat-label" data-i18n="labelDuplicates">Duplicates</span>
      </div>
    </div>

    <!-- 标签页导航 -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="categories" data-i18n="tabCategories">Categories</button>
      <button class="tab-btn" data-tab="duplicates" data-i18n="tabDuplicates">Duplicates</button>
      <button class="tab-btn" data-tab="backups" data-i18n="tabBackups">Backups</button>
    </nav>

    <!-- 可滚动内容区域 -->
    <div class="scrollable-content">
      <!-- 分类建议面板 -->
      <div id="categoriesTab" class="tab-content active">
        <div id="categoriesToolbar" class="list-toolbar hidden">
          <input type="text" id="categoriesSearch" class="search-input" data-i18n-placeholder="placeholderSearchBookmarks" placeholder="Search bookmarks...">
          <div class="toolbar-actions">
            <button id="expandAllCategories" class="btn btn-small btn-outline" data-i18n="btnExpandAll">Expand All</button>
            <button id="collapseAllCategories" class="btn btn-small btn-outline" data-i18n="btnCollapseAll">Collapse All</button>
          </div>
        </div>
        <div id="categoriesList" class="categories-list">
          <p class="empty-state" data-i18n="emptyClickScan">Click "Start Scan" to view category suggestions</p>
        </div>
      </div>

      <!-- 重复检测面板 -->
      <div id="duplicatesTab" class="tab-content">
        <div id="duplicatesToolbar" class="list-toolbar hidden">
          <input type="text" id="duplicatesSearch" class="search-input" data-i18n-placeholder="placeholderSearchBookmarks" placeholder="Search bookmarks...">
        </div>
        <div id="duplicatesList" class="duplicates-list">
          <p class="empty-state" data-i18n="emptyClickScanDup">Click "Start Scan" to detect duplicate bookmarks</p>
        </div>
      </div>

      <!-- 备份管理面板 -->
      <div id="backupsTab" class="tab-content">
        <div class="backup-controls">
          <label class="checkbox-label">
            <input type="checkbox" id="autoBackupToggle">
            <span data-i18n="settingAutoBackup">Enable Auto Backup</span>
          </label>
        </div>
        <div id="backupsList" class="backups-list">
          <p class="empty-state" data-i18n="emptyNoBackups">No backup records</p>
        </div>
      </div>
    </div>

    <!-- 固定底部操作按钮 -->
    <div class="fixed-actions">
      <button id="applyCategoriesBtn" class="btn btn-success hidden" data-i18n="btnApplyCategories">
        ✓ Apply Categories
      </button>
      <button id="removeDuplicatesBtn" class="btn btn-danger hidden" data-i18n="btnRemoveDuplicates">
        🗑 Clean Selected Duplicates
      </button>
    </div>

    <!-- 消息提示 -->
    <div id="messageBox" class="message-box hidden"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
