name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install crx3
        run: npm install -g crx3

      - name: Write private key
        run: |
          echo "${{ secrets.CRX_PRIVATE_KEY }}" > key.pem

      - name: Pack CRX
        run: |
          crx3 pack . \
            -o BookmarkOrganizer-${{ github.ref_name }}.crx \
            -p key.pem

      - name: Create ZIP
        run: |
          zip -r BookmarkOrganizer-${{ github.ref_name }}.zip \
            manifest.json background.js utils.js \
            options.html options.js options.css \
            popup.html popup.js popup.css \
            icons rules

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BookmarkOrganizer-${{ github.ref_name }}.crx
            BookmarkOrganizer-${{ github.ref_name }}.zip
          generate_release_notes: true
