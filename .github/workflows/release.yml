name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write private key
        run: |
          echo "${{ secrets.CRX_PRIVATE_KEY }}" > /tmp/key.pem

      - name: Pack CRX with Chrome
        run: |
          google-chrome --pack-extension="$PWD" --pack-extension-key="/tmp/key.pem" --no-sandbox
          mv "$PWD/../BookmarkOrganizer.crx" BookmarkOrganizer-${{ github.ref_name }}.crx

      - name: Create ZIP
        run: |
          zip -r BookmarkOrganizer-${{ github.ref_name }}.zip \
            manifest.json background.js utils.js i18n.js \
            options.html options.js options.css \
            popup.html popup.js popup.css \
            _locales icons rules

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract section for this version from CHANGELOG.md
          # Remove leading 'v' if present for matching
          VER_TAG="${VERSION#v}"
          BODY=$(awk "/^## \[$VER_TAG\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md | sed -e :a -e '/./,$!d;/^$/{$d;N;};/\n$/{$d;N;};/\n$/ba' | sed 's/$/\\n/' | tr -d '\n')
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BookmarkOrganizer-${{ github.ref_name }}.crx
            BookmarkOrganizer-${{ github.ref_name }}.zip
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
