name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write private key
        run: |
          echo "${{ secrets.CRX_PRIVATE_KEY }}" > key.pem

      - name: Pack CRX with Chrome
        run: |
          google-chrome --pack-extension="$PWD" --pack-extension-key="key.pem" --no-sandbox
          mv "$PWD/../BookmarkOrganizer.crx" BookmarkOrganizer-${{ github.ref_name }}.crx

      - name: Create ZIP
        run: |
          zip -r BookmarkOrganizer-${{ github.ref_name }}.zip \
            manifest.json background.js utils.js \
            options.html options.js options.css \
            popup.html popup.js popup.css \
            icons rules

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BookmarkOrganizer-${{ github.ref_name }}.crx
            BookmarkOrganizer-${{ github.ref_name }}.zip
          generate_release_notes: true
